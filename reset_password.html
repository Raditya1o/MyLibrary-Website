<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyLibrary - Login</title>
    <link rel="stylesheet" href="./frontend/loginStyle.css" />
  </head>
  <body>
    <header>
      <h3>MyLibrary</h3>
    </header>
    <div class="login-container">
      <form action="./backend/koneksi_reset_password_user.php" method="post">
        <h1>Reset Password User</h1>
        <div class="input-box">
          <input
            type="text"
            id="name"
            name="name"
            placeholder="name"
            required
          />
        </div>
        <div class="input-box">
          <input
            type="text"
            id="kelas"
            name="kelas"
            placeholder="Kelas"
            required
          />
        </div>
        <div class="input-box">
          <input
            type="text"
            id="nis"
            name="nis"
            placeholder="NIS"
            required
          />
        </div>
        <div class="input-box">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="new password"
            required
          />
        </div>
        <div class="login-btn">
            <button type="submit" name="submit">Reset Password</button>
        </div>
      </form>
    </div>
  </body>
</html>
