<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyLibrary - Login</title>
    <link rel="stylesheet" href="./frontend/loginStyle.css" />
  </head>
  <body>
    <header>
      <h3>MyLibrary</h3>
    </header>
    <div class="login-container">
      <form action="./backend/koneksi_login_admin.php" method="post">
        <h1>Login Admin</h1>
        <div class="input-box">
          <input
            type="text"
            id="name"
            name="name"
            placeholder="name"
            required
          />
        </div>
        <div class="input-box">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="password"
            required
          />
        </div>
        <div class="submit-btn">
            <button type="submit" name="submit">ENTER</button>
        </div>
        <p class="register-link">
          Forgot Password? <a href="reset_password_admin.html">Reset here</a>
        </p>
      </form>
    </div>
  </body>
</html>
